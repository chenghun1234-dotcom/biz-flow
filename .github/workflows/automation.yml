name: Biz-Flow Daily Auto Update

on:
  schedule:
    - cron: '0 19 * * *'  # KST 기준 매일 새벽 4시 (UTC 19:00 전날)
  workflow_dispatch:       # GitHub Actions 탭에서 수동 실행 가능

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 저장소 체크아웃 ────────────────────────────
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # ── 2. Python 환경 세팅 ───────────────────────────
      - name: Python 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: data_pipeline/requirements.txt

      # ── 3. Python 패키지 설치 ─────────────────────────
      - name: Python 패키지 설치
        run: pip install -r data_pipeline/requirements.txt

      # ── 4. 데이터 수집 및 AI 요약 실행 ───────────────
      - name: 데이터 수집 및 AI 요약 실행
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
        run: python data_pipeline/fetch_and_process.py

      # ── 5. 업데이트된 JSON 커밋 ───────────────────────
      - name: 업데이트된 데이터 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web_app/public/data/policies.json
          if git diff --staged --quiet; then
            echo "변경된 데이터 없음 - 커밋 스킵"
          else
            git commit -m "🤖 자동 업데이트: $(date +'%Y-%m-%d') 지원사업 데이터 갱신"
            git push
          fi

      # ── 6. Node.js 환경 세팅 ─────────────────────────
      - name: Node.js 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web_app/package-lock.json

      # ── 7. Astro 빌드 ────────────────────────────────
      - name: Astro 빌드
        working-directory: ./web_app
        run: |
          npm ci
          npm run build

      # ── 8. GitHub Pages로 배포 ────────────────────────
      - name: GitHub Pages로 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./web_app/dist
